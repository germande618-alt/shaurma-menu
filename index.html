<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaurma</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

/* ===== HERO ===== */
.hero {
  height: 420px;
  background: url("images/hero.jpg") center/cover no-repeat;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.4), #000);
}

/* ===== ЛОГО ===== */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 2;
}

.logo-main {
  font-size: 28px;
  font-weight: bold;
}

.logo-sub {
  color: gold;
  font-size: 14px;
}

/* ===== КОНТАКТЫ ===== */
.contacts {
  position: absolute;
  top: 120px;
  left: 20px;
  right: 20px;
  z-index: 2;
}

.btn {
  display: block;
  margin: 10px 0;
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  text-decoration: none;
  color: white;
}

/* ===== МЕНЮ ===== */
.content {
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 12px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  border-radius: 12px;
}

.price {
  margin: 5px 0;
}

/* ===== +/- ===== */
.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
}

.controls button {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  color: white;
  font-size: 18px;
}

.minus { background: red; }
.plus { background: orange; }

/* ===== ORDER ===== */
.order-btn {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 16px;
  background: linear-gradient(45deg, green, #0f0);
  border: none;
  color: white;
  font-size: 18px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="logo">
    <div class="logo-main">Black Roll®</div>
    <div class="logo-sub">odessa</div>
  </div>

  <div class="contacts">
    <a class="btn" href="https://maps.app.goo.gl/U9jSwZBhYhGr8AGNA">📍 Open location</a>
    <a class="btn" href="tel:+31682852044">📞 +31 6 82852044</a>
    <a class="btn" href="https://wa.me/31682852044">💬 WhatsApp</a>
  </div>

</div>

<!-- MENU -->
<div class="content">
  <h2>Menu</h2>
  <div class="grid" id="menu"></div>
</div>

<button class="order-btn" onclick="order()">Order</button>

<script>
const items = [
  {name:"Shawarma XL", price:18},
  {name:"Standart", price:14.5},
  {name:"Mini", price:12},
  {name:"Hawaii", price:16},
  {name:"Greek", price:16},
  {name:"Arabic", price:16},
  {name:"Suluguni", price:16},

  {name:"Pepsi", price:3},
  {name:"Cola", price:3},
  {name:"Red Bull", price:3},
  {name:"Ayran", price:3},
  {name:"Water", price:3}
];

const menu = document.getElementById("menu");

items.forEach((item, i) => {
  item.count = 0;

  menu.innerHTML += `
  <div class="card">
    <img src="images/hero.jpg">
    <div>${item.name}</div>
    <div class="price">€${item.price}</div>

    <div class="controls">
      <button class="minus" onclick="change(${i}, -1)">-</button>
      <span id="c${i}">0</span>
      <button class="plus" onclick="change(${i}, 1)">+</button>
    </div>
  </div>`;
});

function change(i, val){
  items[i].count += val;
  if(items[i].count < 0) items[i].count = 0;
  document.getElementById("c"+i).innerText = items[i].count;
}

function order(){
  let selected = items.filter(i => i.count > 0);

  if(selected.length === 0){
    alert("Add something to order!");
    return;
  }

  let text = "Order:%0A";

  selected.forEach(i=>{
    text += `${i.name} x${i.count}%0A`;
  });

  window.open(`https://wa.me/31682852044?text=${text}`);
}
</script>

</body>
</html>
