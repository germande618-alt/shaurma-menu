<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Roll</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("images/hero.jpg") center/cover no-repeat;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
}

/* LOGO */
.logo {
  position: absolute;
  top: 30px;
  left: 30px;
  z-index: 2;
}

.logo-main {
  font-size: 40px;
  font-weight: 700;
}

.logo-sub {
  color: #f2b84b;
}

/* CONTACTS */
.contacts {
  position: absolute;
  top: 150px;
  left: 30px;
  width: 320px;
  z-index: 2;
}

.btn {
  display: block;
  margin-bottom: 15px;
  padding: 18px;
  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,0.1);
}

/* MAIN LAYOUT */
.main {
  display: flex;
  gap: 20px;
  padding: 40px;
  margin-top: -200px;
  position: relative;
  z-index: 2;
}

/* LEFT SIDE */
.left {
  flex: 2;
}

/* RIGHT SIDE */
.right {
  width: 260px;
}

/* CARD BIG */
.big-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 20px;
  margin-bottom: 20px;
}

.big-card img {
  width: 100%;
  border-radius: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* SMALL CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 15px;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

/* PRICE */
.price {
  opacity: 0.7;
}

/* CONTROLS */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.controls button {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 10px;
  color: white;
}

.minus { background: red; }
.plus { background: orange; }

/* RIGHT PROFILE */
.profile {
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 25px;
}

.profile img {
  width: 120px;
  border-radius: 50%;
}

/* ORDER */
.order {
  margin-top: 20px;
  padding: 15px;
  background: linear-gradient(90deg, #00c400, #00ff66);
  border-radius: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="hero">

  <div class="logo">
    <div class="logo-main">Black Roll®</div>
    <div class="logo-sub">odessa</div>
  </div>

  <div class="contacts">
    <div class="btn">📍 Open location</div>
    <div class="btn">📞 +31 6 82852044</div>
    <div class="btn">💬 WhatsApp</div>
  </div>

</div>

<div class="main">

  <div class="left">

    <!-- BIG CARD -->
    <div class="big-card">
      <img src="images/person.jpg">
      <h2>Shawarma XL</h2>
      <div class="price">€18</div>

      <div class="controls">
        <button class="minus">-</button>
        <span>0</span>
        <button class="plus">+</button>
      </div>
    </div>

    <!-- GRID -->
    <div class="grid">
      <div class="card">
        <img src="images/person.jpg">
        <h3>Pepsi</h3>
        <div class="price">€3</div>
      </div>

      <div class="card">
        <img src="images/person.jpg">
        <h3>Cola</h3>
        <div class="price">€14.5</div>
      </div>

      <div class="card">
        <img src="images/person.jpg">
        <h3>Red Bull</h3>
        <div class="price">€3</div>
      </div>

      <div class="card">
        <img src="images/person.jpg">
        <h3>Ayran</h3>
        <div class="price">€3</div>
      </div>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <div class="profile">
      <img src="images/avatar.png">
      <h3>Ruslan</h3>
      <div>MOTIVATOR</div>
    </div>

    <div class="order">
      Order
    </div>

  </div>

</div>

</body>
</html>
