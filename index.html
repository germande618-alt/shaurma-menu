<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shaurma</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

/* ===== HERO ===== */
.hero {
  height: 320px;
  background: url("images/hero.jpg") center/cover no-repeat;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.3),
    rgba(0,0,0,0.8),
    #000
  );
}

.logo {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 2;
}

.logo-main {
  font-size: 32px;
  font-weight: bold;
}

.logo-sub {
  color: gold;
  font-size: 14px;
}

/* ===== КОНТЕНТ ===== */
.content {
  padding: 15px;
}

/* ===== КНОПКИ ===== */
.btn {
  display: block;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  text-decoration: none;
  color: white;
}

/* ===== МЕНЮ ===== */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: contain;
}

.price {
  margin: 5px 0;
}

/* ===== КНОПКИ +/- ===== */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.controls button {
  width: 30px;
  height: 30px;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 18px;
}

.minus { background: red; }
.plus { background: orange; }

/* ===== ORDER ===== */
.order-btn {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 15px;
  background: green;
  color: white;
  text-align: center;
  font-size: 18px;
  border: none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="logo">
    <div class="logo-main">Black Roll®</div>
    <div class="logo-sub">odessa</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

<a class="btn" href="https://maps.app.goo.gl/U9jSwZBhYhGr8AGNA" target="_blank">
📍 Open location
</a>

<a class="btn" href="tel:+31682852044">
📞 +31 6 82852044
</a>

<a class="btn" href="https://wa.me/31682852044" target="_blank">
💬 WhatsApp
</a>

<h2>Menu</h2>

<div class="grid" id="menu"></div>

</div>

<button class="order-btn" onclick="order()">Order</button>

<script>
const items = [
  {name:"Shawarma XL", price:18, img:"images/person.png"},
  {name:"Standart", price:14.5, img:"images/person.png"},
  {name:"Mini", price:12, img:"images/person.png"},
  {name:"Hawaii", price:16, img:"images/person.png"},
  {name:"Greek", price:16, img:"images/person.png"},
  {name:"Arabic", price:16, img:"images/person.png"},
  {name:"Suluguni", price:16, img:"images/person.png"},

  {name:"Pepsi", price:3, img:"images/pepsi.png"},
  {name:"Cola", price:3, img:"images/cola.png"},
  {name:"Red Bull", price:3, img:"images/redbull.png"},
  {name:"Ayran", price:3, img:"images/ayran.png"},
  {name:"Water", price:3, img:"images/water.png"}
];

const menu = document.getElementById("menu");

items.forEach((item, i) => {
  item.count = 0;

  menu.innerHTML += `
  <div class="card">
    <img src="${item.img}">
    <div>${item.name}</div>
    <div class="price">€${item.price}</div>

    <div class="controls">
      <button class="minus" onclick="change(${i}, -1)">-</button>
      <span id="count${i}">0</span>
      <button class="plus" onclick="change(${i}, 1)">+</button>
    </div>
  </div>`;
});

function change(i, val){
  items[i].count += val;
  if(items[i].count < 0) items[i].count = 0;
  document.getElementById("count"+i).innerText = items[i].count;
}

function order(){
  let selected = items.filter(i => i.count > 0);

  if(selected.length === 0){
    alert("Add something to order!");
    return;
  }

  let text = "Order:%0A";

  selected.forEach(i=>{
    text += `${i.name} x${i.count}%0A`;
  });

  window.open(`https://wa.me/31682852044?text=${text}`);
}
</script>

</body>
</html>
