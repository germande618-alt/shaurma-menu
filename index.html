<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Roll Odessa</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #000;
  color: white;
}

/* ===== LOGO ===== */
.logo {
  text-align: center;
  padding: 20px 0;
}

.logo-main {
  font-size: 32px;
  font-weight: 600;
}

.logo-sub {
  font-size: 16px;
  color: #d4a017;
  margin-top: -5px;
}

/* ===== HERO ===== */
.hero {
  width: 100%;
  height: 260px;
  background: url("images/hero.jpg") center/cover no-repeat;
  border-radius: 0 0 20px 20px;
}

/* ===== CONTACTS ===== */
.contacts {
  padding: 15px;
}

.btn {
  background: #111;
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 12px;
  text-align: center;
  font-size: 16px;
  cursor: pointer;
}

.btn:hover {
  background: #1a1a1a;
}

/* ===== MENU ===== */
.menu {
  padding: 15px;
}

.menu-title {
  font-size: 20px;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}

.card h3 {
  margin: 10px 0 5px;
  font-size: 16px;
}

.card p {
  color: #d4a017;
}

.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 10px;
}

.controls button {
  width: 30px;
  height: 30px;
  border: none;
  border-radius: 8px;
  margin: 0 5px;
  font-size: 18px;
  cursor: pointer;
}

.minus { background: red; color: white; }
.plus { background: orange; color: black; }

/* ===== ORDER BUTTON ===== */
.order {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: green;
  padding: 18px;
  text-align: center;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <div class="logo-main">Black Roll®</div>
  <div class="logo-sub">odessa</div>
</div>

<!-- HERO IMAGE -->
<div class="hero"></div>

<!-- CONTACTS -->
<div class="contacts">
  <div class="btn" onclick="openMap()">📍 Open location</div>
  <div class="btn" onclick="call()">📞 Call: +31 6 82852044</div>
  <div class="btn" onclick="whatsapp()">💬 WhatsApp</div>
</div>

<!-- MENU -->
<div class="menu">
  <div class="menu-title">🌯 Menu</div>

  <div class="grid" id="menu"></div>
</div>

<!-- ORDER -->
<div class="order" onclick="order()">Order</div>

<script>
let items = [
  {name:"Standart", price:14.5, count:0},
  {name:"Hawaii", price:16, count:0},
  {name:"Mini", price:13, count:0},
  {name:"Asorti", price:16, count:0},
  {name:"Greek", price:16, count:0},
  {name:"Arabic", price:15, count:0},
  {name:"Suluguni", price:16, count:0},
  {name:"XL", price:18, count:0},
  {name:"Pepsi", price:3, count:0},
  {name:"Cola", price:3, count:0},
  {name:"Red Bull", price:3, count:0},
  {name:"Ayran", price:3, count:0},
  {name:"Water", price:3, count:0}
];

function render(){
  let html = "";
  items.forEach((item,i)=>{
    html += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>€${item.price}</p>

        <div class="controls">
          <button class="minus" onclick="change(${i},-1)">-</button>
          <span>${item.count}</span>
          <button class="plus" onclick="change(${i},1)">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("menu").innerHTML = html;
}

function change(i,val){
  items[i].count += val;
  if(items[i].count < 0) items[i].count = 0;
  render();
}

function order(){
  let text = "Hello, I want to order:%0A";

  let hasItems = items.some(i => i.count > 0);
  if(!hasItems){
    alert("Add something!");
    return;
  }

  items.forEach(i=>{
    if(i.count > 0){
      text += `${i.name} x${i.count}%0A`;
    }
  });

  text += "%0ATime: ";

  window.open(`https://wa.me/31682852044?text=${text}`);
}

function openMap(){
  window.open("https://maps.app.goo.gl/U9jSwZBhYhGr8AGNA");
}

function call(){
  window.location.href = "tel:+31682852044";
}

function whatsapp(){
  window.open("https://wa.me/31682852044");
}

render();
</script>

</body>
</html>
