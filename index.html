<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaurma</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  padding: 20px;
  text-align: center;
}

.map-btn {
  background: #333;
  padding: 10px;
  border-radius: 8px;
  display: inline-block;
  margin-top: 10px;
  color: white;
  text-decoration: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}

.card h3 {
  margin: 10px 0;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.add {
  background: orange;
  color: white;
}

.minus {
  background: red;
  color: white;
}

.plus {
  background: orange;
  color: white;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: green;
  text-align: center;
  padding: 15px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>🌯 Shaurma</h1>
  <p>📍 Den Haag</p>
  <a class="map-btn" href="https://maps.google.com" target="_blank">Открыть карту</a>
</div>

<div class="grid" id="menu"></div>

<div class="footer" onclick="order()">Заказать</div>

<script>
let items = [
  {name: "Шаурма обычная", price: 6, count: 0},
  {name: "Шаурма большая", price: 8, count: 0},
  {name: "Кола", price: 2, count: 0}
];

function render() {
  let menu = document.getElementById("menu");
  menu.innerHTML = "";

  items.forEach((item, i) => {
    menu.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>€${item.price}</p>
        <div class="controls">
          <button class="minus" onclick="change(${i}, -1)">-</button>
          <span>${item.count}</span>
          <button class="plus" onclick="change(${i}, 1)">+</button>
        </div>
      </div>
    `;
  });
}

function change(i, val) {
  items[i].count += val;
  if (items[i].count < 0) items[i].count = 0;
  render();
}

function order() {
  let name = prompt("Введите имя:");
  let time = prompt("Во сколько заберёте?");

  if (!name || !time) return;

  let text = "Привет! Заказ на самовывоз:%0A%0A";
  text += "Имя: " + name + "%0A";
  text += "Время: " + time + "%0A%0A";

  items.forEach(item => {
    if (item.count > 0) {
      text += "- " + item.name + " x" + item.count + "%0A";
    }
  });

  let phone = "316XXXXXXXX"; // ВСТАВЬ НОМЕР
  window.open("https://wa.me/" + phone + "?text=" + text);
}

render();
</script>

</body>
</html>
