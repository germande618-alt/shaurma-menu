<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaurma</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  padding: 20px;
  text-align: center;
}

.map-btn {
  background: #333;
  padding: 10px;
  border-radius: 8px;
  display: inline-block;
  margin-top: 10px;
  color: white;
  text-decoration: none;
}

.section {
  padding: 10px 15px;
  font-size: 18px;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 15px;
  text-align: center;
}

.card img {
  width: 80px;
  height: 80px;
  object-fit: cover;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 5px;
}

button {
  border: none;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

.minus { background: red; color: white; }
.plus { background: orange; color: white; }

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: green;
  text-align: center;
  padding: 15px;
  font-size: 18px;
  cursor: pointer;
}

.popup {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  transition: 0.3s;
}

.popup.active {
  bottom: 0;
}

.popup input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

.popup button {
  background: orange;
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🌯 Shaurma</h1>
  <p>📍 Den Haag</p>
  <a class="map-btn" href="https://maps.google.com" target="_blank">Open map</a>
</div>

<div class="section">🥙 Menu</div>
<div class="grid" id="menu"></div>

<div class="section">🥤 Drinks</div>
<div class="grid" id="drinks"></div>

<div class="footer" onclick="openPopup()">Order</div>

<div class="popup" id="popup">
  <h3>Your order</h3>
  <input type="text" id="name" placeholder="Your name">
  <input type="time" id="time">
  <button onclick="sendOrder()">Send to WhatsApp</button>
</div>

<script>
let menu = [
  {name: "Shaurma XL", price: 18, img: "images/xl.png", count: 0},
  {name: "Standart", price: 14.5, img: "images/standart.png", count: 0},
  {name: "Hawaii", price: 16, img: "images/hawaii.png", count: 0},
  {name: "Mini", price: 13, img: "images/mini.png", count: 0},
  {name: "Asorti", price: 16, img: "images/asorti.png", count: 0},
  {name: "Greek", price: 16, img: "images/greek.png", count: 0},
  {name: "Arabic", price: 15, img: "images/arabic.png", count: 0},
  {name: "Suluguni with meat", price: 16, img: "images/suluguni.png", count: 0}
];

let drinks = [
  {name: "Pepsi", price: 3, img: "images/pepsi.png", count: 0},
  {name: "Cola", price: 3, img: "images/cola.png", count: 0},
  {name: "Red Bull", price: 3, img: "images/redbull.png", count: 0},
  {name: "Ayran", price: 3, img: "images/ayran.png", count: 0},
  {name: "Water", price: 3, img: "images/water.png", count: 0}
];

function render() {
  renderSection(menu, "menu");
  renderSection(drinks, "drinks");
}

function renderSection(list, id) {
  let container = document.getElementById(id);
  container.innerHTML = "";

  list.forEach((item, i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <h3>${item.name}</h3>
        <p>€${item.price}</p>
        <div class="controls">
          <button class="minus" onclick="change('${id}', ${i}, -1)">-</button>
          <span>${item.count}</span>
          <button class="plus" onclick="change('${id}', ${i}, 1)">+</button>
        </div>
      </div>
    `;
  });
}

function change(type, i, val) {
  let list = type === "menu" ? menu : drinks;
  list[i].count += val;
  if (list[i].count < 0) list[i].count = 0;
  render();
}

function openPopup() {
  document.getElementById("popup").classList.add("active");
}

function sendOrder() {
  let name = document.getElementById("name").value;
  let time = document.getElementById("time").value;

  if (!name || !time) {
    alert("Enter name and time");
    return;
  }

  let text = "Hello! Order:%0A%0A";
  text += "Name: " + name + "%0A";
  text += "Pickup time: " + time + "%0A%0A";

  [...menu, ...drinks].forEach(item => {
    if (item.count > 0) {
      text += "- " + item.name + " x" + item.count + "%0A";
    }
  });

  let phone = "316XXXXXXXX"; // ВСТАВЬ НОМЕР
  window.open("https://wa.me/" + phone + "?text=" + text);
}

render();
</script>

</body>
</html>
