<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Roll</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

/* HERO */
.hero {
  height: 480px;
  background: url("images/hero.jpg") center/cover no-repeat;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.3),
    rgba(0,0,0,0.8),
    #000
  );
}

/* LOGO */
.logo {
  position: absolute;
  top: 25px;
  left: 20px;
  z-index: 2;
}

.logo-main {
  font-size: 34px;
  font-weight: 700;
}

.logo-sub {
  color: #f2b84b;
}

/* CONTACTS */
.contacts {
  position: absolute;
  top: 140px;
  left: 20px;
  right: 20px;
  z-index: 2;
}

/* GLASS BUTTON */
.btn {
  display: block;
  margin: 12px 0;
  padding: 16px;
  border-radius: 18px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,0.1);

  box-shadow: 0 8px 30px rgba(0,0,0,0.6);

  color: white;
  text-decoration: none;
}

/* CONTENT */
.content {
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);

  border-radius: 22px;
  padding: 14px;

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: 0 10px 40px rgba(0,0,0,0.7);

  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 16px;
}

.price {
  margin: 6px 0;
  opacity: 0.8;
}

/* CONTROLS */
.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
}

.controls button {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
  color: white;
}

.minus {
  background: linear-gradient(45deg, #ff3b3b, #a30000);
}

.plus {
  background: linear-gradient(45deg, #ffb300, #ff6f00);
}

/* ORDER */
.order-btn {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 18px;

  background: linear-gradient(90deg, #00c400, #00ff66);

  border: none;
  font-size: 18px;
  color: white;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="logo">
    <div class="logo-main">Black Roll®</div>
    <div class="logo-sub">odessa</div>
  </div>

  <div class="contacts">
    <a class="btn" href="#">📍 Open location</a>
    <a class="btn" href="tel:+31682852044">📞 +31 6 82852044</a>
    <a class="btn" href="#">💬 WhatsApp</a>
  </div>

</div>

<!-- MENU -->
<div class="content">

  <h2>Menu</h2>

  <div class="grid" id="menu"></div>

</div>

<button class="order-btn">Order</button>

<script>
const items = [
  {name:"Shawarma XL", price:18},
  {name:"Standart", price:14.5},
  {name:"Mini", price:12},
  {name:"Hawaii", price:16}
];

const menu = document.getElementById("menu");

items.forEach((item, i) => {
  const card = document.createElement("div");

  // первая карточка большая
  if(i === 0){
    card.style.gridColumn = "span 2";
  }

  card.className = "card";

  card.innerHTML = `
    <img src="images/person.jpg">
    <h3>${item.name}</h3>
    <div class="price">€${item.price}</div>

    <div class="controls">
      <button class="minus">-</button>
      <span>0</span>
      <button class="plus">+</button>
    </div>
  `;

  menu.appendChild(card);
});
</script>

</body>
</html>
